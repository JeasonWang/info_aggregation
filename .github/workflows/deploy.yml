name: Deploy Info Aggregation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t info-aggregation:latest .

      - name: Export Backend Image
        run: docker save info-aggregation:latest | gzip > info-aggregation-image.tar.gz

      - name: Prepare SSH Key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%b' '${{ secrets.SERVER_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy Deploy Files To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          source: "docker-compose.prod.yml,info-aggregation-image.tar.gz"
          target: ${{ secrets.SERVER_DEPLOY_PATH }}

      - name: Deploy On Server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_TYPE: ${{ secrets.DB_TYPE }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          envs: DB_TYPE,DB_HOST,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME,LOG_LEVEL,SERVER_DEPLOY_PATH
          script: |
            set -e
            mkdir -p "$SERVER_DEPLOY_PATH"
            cd "$SERVER_DEPLOY_PATH"
            cat > .env <<EOF
            DB_TYPE=${DB_TYPE:-sqlite}
            DB_HOST=$DB_HOST
            DB_PORT=${DB_PORT:-3306}
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=${DB_NAME:-info_aggregation}
            LOG_LEVEL=${LOG_LEVEL:-INFO}
            EOF
            gunzip -c info-aggregation-image.tar.gz | docker load
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
            docker image prune -f
